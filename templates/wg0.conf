[Interface]
PrivateKey = {SERVER_PRIVATE_KEY}
Address = 10.0.0.1/24, fd42:42:42::1/64
ListenPort = 445

# 转发 + NAT（自动检测网卡）
PostUp = sysctl -w net.ipv4.ip_forward=1
PostUp = iptables -A FORWARD -i %i -o {INTERFACE} -j ACCEPT
PostUp = iptables -A FORWARD -i {INTERFACE} -o %i -m state --state RELATED,ESTABLISHED -j ACCEPT
PostUp = iptables -t nat -A POSTROUTING -o {INTERFACE} -j MASQUERADE

PostDown = iptables -D FORWARD -i %i -o {INTERFACE} -j ACCEPT
PostDown = iptables -D FORWARD -i {INTERFACE} -o %i -m state --state RELATED,ESTABLISHED -j ACCEPT
PostDown = iptables -t nat -D POSTROUTING -o {INTERFACE} -j MASQUERADE

# IPv6 转发 + NAT
PostUp = sysctl -w net.ipv6.conf.all.forwarding=1
PostUp = ip6tables -A FORWARD -i %i -o {INTERFACE} -j ACCEPT
PostUp = ip6tables -A FORWARD -i {INTERFACE} -o %i -m state --state RELATED,ESTABLISHED -j ACCEPT
PostUp = ip6tables -t nat -A POSTROUTING -o {INTERFACE} -j MASQUERADE

PostDown = ip6tables -D FORWARD -i %i -o {INTERFACE} -j ACCEPT
PostDown = ip6tables -D FORWARD -i {INTERFACE} -o %i -m state --state RELATED,ESTABLISHED -j ACCEPT
PostDown = ip6tables -t nat -D POSTROUTING -o {INTERFACE} -j MASQUERADE

[Peer]
PublicKey = {CLIENT_PUBLIC_KEY}
AllowedIPs = 10.0.0.2/32, fd42:42:42::2/128
